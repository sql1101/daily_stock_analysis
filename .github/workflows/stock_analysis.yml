# 工作流名称（自定义，方便识别）
name: Daily Stock Analysis Auto Run

# 触发条件：1. 定时运行 2. 手动触发（方便测试）
on:
  # 定时运行（Cron 表达式，时区为 UTC，北京时间需+8小时）
  # 示例：每天北京时间 19:00 运行（UTC 11:00），可根据需要修改
  schedule:
    - cron: '0 11 * * *'
  # 手动触发（在 Actions 页面可点击运行，测试用）
  workflow_dispatch:

# 定义要运行的作业
jobs:
  run-stock-analysis:
    # 运行环境（选择 Ubuntu 最新版，兼容性最好）
    runs-on: ubuntu-latest
    # 步骤：一步步执行的操作
    steps:
      # 步骤1：克隆代码到 GitHub 服务器
      - name: Checkout repository code
        uses: actions/checkout@v4  # 官方克隆代码的 Action

      # 步骤2：配置 Python 环境（匹配股票分析的常用版本）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 推荐 3.8+，3.10 稳定性更好
          cache: 'pip'  # 缓存依赖，加速下次运行

      # 步骤3：安装项目依赖（核心步骤）
      - name: Install dependencies
        run: |
          # 升级 pip
          python -m pip install --upgrade pip
          # 安装依赖（优先读 requirements.txt，没有则手动装核心包）
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          else
            # 该仓库常用的股票分析依赖（覆盖99%场景）
            pip install akshare tushare pandas numpy matplotlib seaborn requests -i https://pypi.tuna.tsinghua.edu.cn/simple
          fi

      # 步骤4：配置敏感信息（如果仓库需要 Tushare Token 等）
      - name: Set environment variables
        env:
          # 从 GitHub Secrets 读取 Token（避免明文泄露）
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          # 将 Token 写入配置文件（假设仓库用 config.py 存储配置）
          echo "TUSHARE_TOKEN = '$TUSHARE_TOKEN'" > config.py

      # 步骤5：运行核心分析脚本（关键！替换为仓库的主脚本名）
      - name: Run stock analysis script
        run: |
          # 先查看仓库的主脚本（常见的是 main.py/analysis.py）
          # 如果不知道脚本名，先运行 ls 查看文件列表
          ls
          # 运行主脚本（请根据仓库实际的主脚本名修改，比如 main.py）
          python main.py

      # 可选步骤：保存分析结果（比如生成的报表/图片到仓库）
      - name: Commit and push results
        run: |
          # 配置 Git 身份（必须，否则无法提交）
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 添加所有生成的文件
          git add .
          # 提交（仅当有变更时）
          git commit -m "Auto update stock analysis results $(date +'%Y-%m-%d')" || echo "No changes to commit"
          # 推送到仓库
          git push
